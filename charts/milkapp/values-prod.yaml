# Production environment overrides
image:
  repository: jrbalrog9/babymilk
  tag: "stable"
  pullPolicy: IfNotPresent

replicaCount: 2

ingress:
  enabled: true
  className: ""
  host: ""

nginx:
  enabled: true

postgresql:
  enabled: true
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
