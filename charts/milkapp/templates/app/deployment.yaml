apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "milkapp.fullname" . }}-backend
  labels:
    {{- include "milkapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "milkapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "milkapp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "milkapp.databaseHost" . }} 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      {{- end }}
      containers:
        - name: milkapp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "milkapp.fullname" . }}-db
                  key: DATABASE_URL
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /api/feedings
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/feedings
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
