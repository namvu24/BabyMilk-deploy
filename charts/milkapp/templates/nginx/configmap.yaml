apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "milkapp.fullname" . }}-nginx
  labels:
    {{- include "milkapp.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;

        location /static/ {
            alias /usr/share/nginx/html/;
        }

        location /api/ {
            proxy_pass http://{{ include "milkapp.fullname" . }}:{{ .Values.service.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
