# BabyMilk Helm Chart — Default Values

# -- App deployment
replicaCount: 1

image:
  repository: namvu24/babymilk
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# -- Nginx reverse proxy / static file server
nginx:
  enabled: true
  image:
    repository: nginx
    tag: alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  cacheControl:
    html: "no-cache, no-store, must-revalidate"
    static: "public, max-age=300"

# -- Ingress
ingress:
  enabled: true
  className: traefik
  host: ""
  # Add CDN/controller specific annotations per environment.
  # Example (Cloudflare):
  # annotations:
  #   external-dns.alpha.kubernetes.io/target: your-cdn-endpoint.example.com
  annotations: {}

# -- Database connection
database:
  host: ""
  port: 5432
  sslmode: disable

secrets:
  db:
    create: true
    name: ""
    key: DATABASE_URL
  postgresql:
    create: true
    name: ""
    userKey: POSTGRES_USER
    passwordKey: POSTGRES_PASSWORD
    databaseKey: POSTGRES_DB

# -- PostgreSQL (official image, self-managed)
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: babymilk
    password:
    database: babymilk
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
