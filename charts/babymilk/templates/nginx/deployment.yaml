{{- if .Values.nginx.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "babymilk.fullname" . }}-nginx
  labels:
    {{- include "babymilk.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "babymilk.nginxSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "babymilk.nginxSelectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: copy-static
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c", "cp -r /app/static/* /usr/share/nginx/html/"]
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
            - name: static-files
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "babymilk.fullname" . }}-nginx
        - name: static-files
          emptyDir: {}
{{- end }}
