apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "babymilk.fullname" . }}-nginx
  labels:
    {{- include "babymilk.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;

        location /static/ {
            alias /usr/share/nginx/html/;
            add_header Cache-Control "{{ .Values.nginx.cacheControl.static }}" always;
            try_files $uri =404;
        }

        location /api/ {
            proxy_pass http://{{ include "babymilk.fullname" . }}-backend:{{ .Values.service.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
            add_header Cache-Control "{{ .Values.nginx.cacheControl.html }}" always;
        }
    }
