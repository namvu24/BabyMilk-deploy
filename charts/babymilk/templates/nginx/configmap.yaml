apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "babymilk.fullname" . }}-nginx
  labels:
    {{- include "babymilk.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;

        location /static/ {
            proxy_pass http://{{ include "babymilk.fullname" . }}:{{ .Values.service.port }}/static/;
            add_header Cache-Control "{{ .Values.nginx.cacheControl.static }}" always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://{{ include "babymilk.fullname" . }}:{{ .Values.service.port }}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://{{ include "babymilk.fullname" . }}:{{ .Values.service.port }}/;
            add_header Cache-Control "{{ .Values.nginx.cacheControl.html }}" always;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
