apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "babymilk.fullname" . }}-backend
  labels:
    {{- include "babymilk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "babymilk.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "babymilk.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "babymilk.databaseHost" . }} 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      {{- end }}
      containers:
        - name: babymilk
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "babymilk.dbSecretName" . }}
                  key: {{ .Values.secrets.db.key }}
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
