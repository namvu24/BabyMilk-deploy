apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: milkapp-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/namvu24/milkapp-deploy.git
    targetRevision: main
    path: charts/milkapp
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: milkapp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
