apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: babymilk-root-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/namvu24/babymilk-deploy.git
    targetRevision: refs/tags/v3.1.2
    path: argocd/bootstrap/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
