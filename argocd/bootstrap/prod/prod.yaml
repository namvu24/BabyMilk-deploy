apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: babymilk-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/namvu24/babymilk-deploy.git
    targetRevision: refs/tags/v1.1.0
    path: charts/babymilk
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

