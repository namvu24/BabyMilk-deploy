apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: babymilk-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/namvu24/babymilk-deploy.git
    targetRevision: v1.0.0
    path: platform/vault-eso/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
