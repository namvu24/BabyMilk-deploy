apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: babymilk-root-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/namvu24/babymilk-deploy.git
    targetRevision: master
    path: argocd/bootstrap/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
