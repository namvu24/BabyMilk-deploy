apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: babymilk-vault
spec:
  provider:
    vault:
      server: http://vault.vault.svc:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: babymilk-secrets
          serviceAccountRef:
            name: babymilk-vault-auth
